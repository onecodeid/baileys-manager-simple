<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — WhatsApp Device Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green-900: #1b5e20;
            --green-700: #2e7d32;
            --green-500: #43a047;
            --green-400: #66bb6a;
            --green-100: #e8f5e9;
            --wa-green: #25d366;
            --dark:  #0d1117;
            --dark2: #161b22;
            --dark3: #21262d;
            --border: rgba(255,255,255,0.08);
            --text:  #e6edf3;
            --muted: #8b949e;
            --error: #f85149;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 60% at 20% -10%, rgba(37,211,102,.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 110%, rgba(46,125,50,.22) 0%, transparent 55%);
            animation: glow-shift 8s ease-in-out infinite alternate;
        }
        @keyframes glow-shift {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: .85; transform: scale(1.04); }
        }

        /* Floating particles */
        .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(37,211,102,.12);
            animation: float-up linear infinite;
        }
        @keyframes float-up {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: .4; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Card */
        .card-wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px;
            padding: 16px;
            animation: card-enter .5s cubic-bezier(.22,.61,.36,1) both;
        }
        @keyframes card-enter {
            from { opacity: 0; transform: translateY(28px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            background: rgba(22,27,34,.85);
            backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px 36px;
            box-shadow:
                0 0 0 1px rgba(37,211,102,.06),
                0 32px 64px rgba(0,0,0,.55),
                0 8px 24px rgba(0,0,0,.35);
        }

        /* Logo */
        .logo-ring {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-500), var(--wa-green));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 0 8px rgba(37,211,102,.12), 0 4px 20px rgba(37,211,102,.3);
            animation: pulse-ring 3s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0%,100% { box-shadow: 0 0 0 8px rgba(37,211,102,.12), 0 4px 20px rgba(37,211,102,.3); }
            50%      { box-shadow: 0 0 0 14px rgba(37,211,102,.06), 0 4px 28px rgba(37,211,102,.45); }
        }
        .logo-ring .mdi { font-size: 36px; color: #fff; }

        /* Heading */
        .heading { text-align: center; margin-bottom: 32px; }
        .heading h1 {
            font-size: 22px; font-weight: 700;
            color: var(--text);
            letter-spacing: -.3px;
            margin-bottom: 4px;
        }
        .heading p { font-size: 13px; color: var(--muted); }

        /* Form */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 12px; font-weight: 600;
            color: var(--muted);
            text-transform: uppercase; letter-spacing: .6px;
            margin-bottom: 7px;
        }
        .input-wrap { position: relative; }
        .input-wrap .mdi {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            font-size: 18px; color: var(--muted);
            pointer-events: none;
            transition: color .2s;
        }
        .input-wrap input {
            width: 100%;
            background: var(--dark3);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 10px;
            padding: 11px 44px 11px 42px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        .input-wrap input::placeholder { color: var(--muted); }
        .input-wrap input:focus {
            border-color: var(--green-400);
            background: rgba(33,38,45,.9);
            box-shadow: 0 0 0 3px rgba(102,187,106,.15);
        }
        .input-wrap input:focus + .mdi,
        .input-wrap .mdi.focused { color: var(--green-400); }

        /* Password toggle */
        .toggle-pw {
            position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            font-size: 18px; color: var(--muted);
            transition: color .2s;
            padding: 0; line-height: 1;
        }
        .toggle-pw:hover { color: var(--green-400); }

        /* Error message */
        .error-msg {
            display: none;
            background: rgba(248,81,73,.12);
            border: 1px solid rgba(248,81,73,.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--error);
            margin-bottom: 18px;
            animation: shake .3s ease;
        }
        .error-msg.show { display: flex; align-items: center; gap: 8px; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-6px); }
            40%,80% { transform: translateX(6px); }
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--green-500) 0%, var(--wa-green) 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 4px 18px rgba(37,211,102,.3);
        }
        .btn-login:hover:not(:disabled) {
            opacity: .92;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(37,211,102,.42);
        }
        .btn-login:active:not(:disabled) { transform: translateY(0); }
        .btn-login:disabled { opacity: .6; cursor: not-allowed; }
        .btn-login .btn-text { transition: opacity .2s; }
        .btn-login.loading .btn-text { opacity: 0; }
        .btn-login .spinner {
            display: none;
            position: absolute; inset: 0;
            align-items: center; justify-content: center;
        }
        .btn-login.loading .spinner { display: flex; }
        .spinner .ring {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--muted);
        }
        .card-footer a { color: var(--green-400); text-decoration: none; }
        .card-footer a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 28px 20px 24px; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<div class="card-wrap">
    <div class="card">

        <div class="logo-ring">
            <span class="mdi mdi-whatsapp"></span>
        </div>

        <div class="heading">
            <h1>WhatsApp Device Manager</h1>
            <p>Sign in to manage your WhatsApp sessions</p>
        </div>

        <div class="error-msg" id="errorMsg">
            <span class="mdi mdi-alert-circle"></span>
            <span id="errorText">Invalid credentials.</span>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">Email or Username</label>
                <div class="input-wrap">
                    <span class="mdi mdi-account-outline" id="iconUser"></span>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="admin@example.com"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="mdi mdi-lock-outline" id="iconPw"></span>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-pw" id="togglePw" tabindex="-1" title="Toggle password visibility">
                        <span class="mdi mdi-eye-outline" id="eyeIcon"></span>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <span class="btn-text">Sign In</span>
                <span class="spinner"><span class="ring"></span></span>
            </button>
        </form>

        <div class="card-footer">
            Baileys Manager &mdash; Secure Session
        </div>

    </div>
</div>

<script>
    // ── Particles ─────────────────────────────────────────────────────────────
    (function () {
        const container = document.getElementById('particles');
        const count = 18;
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 4 + Math.random() * 14;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random()*100}%;
                animation-duration:${8 + Math.random()*14}s;
                animation-delay:${-Math.random()*20}s;
            `;
            container.appendChild(p);
        }
    })();

    // ── Input focus icon colour ───────────────────────────────────────────────
    document.getElementById('username').addEventListener('focus', () => document.getElementById('iconUser').style.color = 'var(--green-400)');
    document.getElementById('username').addEventListener('blur',  () => document.getElementById('iconUser').style.color = '');
    document.getElementById('password').addEventListener('focus', () => document.getElementById('iconPw').style.color = 'var(--green-400)');
    document.getElementById('password').addEventListener('blur',  () => document.getElementById('iconPw').style.color = '');

    // ── Password toggle ───────────────────────────────────────────────────────
    document.getElementById('togglePw').addEventListener('click', () => {
        const input   = document.getElementById('password');
        const icon    = document.getElementById('eyeIcon');
        const isText  = input.type === 'text';
        input.type    = isText ? 'password' : 'text';
        icon.className = isText ? 'mdi mdi-eye-outline' : 'mdi mdi-eye-off-outline';
    });

    // ── Login form ────────────────────────────────────────────────────────────
    const form    = document.getElementById('loginForm');
    const btn     = document.getElementById('btnLogin');
    const errBox  = document.getElementById('errorMsg');
    const errText = document.getElementById('errorText');

    function showError(msg) {
        errText.textContent = msg;
        errBox.classList.add('show');
    }
    function hideError() { errBox.classList.remove('show'); }
    function setLoading(on) {
        btn.disabled = on;
        btn.classList.toggle('loading', on);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showError('Please enter your email/username and password.');
            return;
        }

        setLoading(true);
        try {
            const res  = await fetch('auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', username, password })
            });
            const data = await res.json();

            if (data.success) {
                btn.style.background = 'linear-gradient(135deg,#2e7d32,#43a047)';
                btn.querySelector('.btn-text').textContent = '✓ Signed in!';
                setTimeout(() => { window.location.href = 'index.php'; }, 600);
            } else {
                showError(data.message || 'Invalid credentials.');
                setLoading(false);
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        } catch (err) {
            showError('Connection error. Please try again.');
            setLoading(false);
        }
    });

    // ── Auto-redirect if already logged in ───────────────────────────────────
    (async () => {
        try {
            const res = await fetch('auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'check' })
            });
            if (res.ok) {
                const data = await res.json();
                if (data.authenticated) window.location.href = 'index.php';
            }
        } catch (_) {}
    })();
</script>

</body>
</html>
